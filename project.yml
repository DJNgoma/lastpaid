name: HowMuch
options:
  bundleIdPrefix: com.djngoma
  deploymentTarget:
    iOS: 17.0
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: 1.0
    TARGETED_DEVICE_FAMILY: "1"
targets:
  HowMuch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HowMuch
    info:
      path: HowMuch/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "2"
        CFBundleDisplayName: "Last Paid"
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: "Last Paid uses the camera to scan product barcodes so you can save prices faster."
        NSLocationWhenInUseUsageDescription: "Last Paid can optionally tag where you bought a product so you can remember which store had the best deal."
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.djngoma.HowMuch
        PRODUCT_NAME: HowMuch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: HowMuch/Info.plist
        SUPPORTS_MACCATALYST: false
    dependencies: []
  HowMuchTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HowMuchTests
      - path: HowMuch/Domain
      - path: HowMuch/Models
      - path: HowMuch/Persistence
      - path: HowMuch/Repositories
      - path: HowMuch/Services
      - path: HowMuch/Utilities
    info:
      path: HowMuchTests/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.djngoma.HowMuchTests
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: HowMuchTests/Info.plist
        TEST_HOST: ""
        BUNDLE_LOADER: ""
    dependencies: []
schemes:
  HowMuch:
    build:
      targets:
        HowMuch: all
        HowMuchTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - name: HowMuchTests
